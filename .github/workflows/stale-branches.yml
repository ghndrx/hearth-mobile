name: Stale Branch Cleanup

on:
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Delete stale branches
        run: |
          CUTOFF_DATE=$(date -u -d '14 days ago' +%s 2>/dev/null || date -u -v-14d +%s)
          PROTECTED_PATTERN='^(main|master|develop|release/.*)$'

          git fetch --prune origin

          for BRANCH in $(git branch -r --format='%(refname:short)' | sed 's|origin/||'); do
            if echo "$BRANCH" | grep -qE "$PROTECTED_PATTERN"; then
              echo "Skipping protected branch: $BRANCH"
              continue
            fi

            LAST_COMMIT_DATE=$(git log -1 --format='%ct' "origin/$BRANCH" 2>/dev/null || echo "0")

            if [ "$LAST_COMMIT_DATE" -lt "$CUTOFF_DATE" ]; then
              echo "Deleting stale branch: $BRANCH (last commit: $(date -u -d "@$LAST_COMMIT_DATE" +%Y-%m-%d 2>/dev/null || date -u -r "$LAST_COMMIT_DATE" +%Y-%m-%d))"
              git push origin --delete "$BRANCH" || echo "Failed to delete $BRANCH"
            else
              echo "Keeping active branch: $BRANCH"
            fi
          done
